<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Guardian</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ['ui-monospace','SFMono-Regular','monospace'] } } }
    }
  </script>
  <style type="text/tailwindcss">
    .badge        { @apply inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium whitespace-nowrap; }
    .badge-green  { @apply badge bg-emerald-100 text-emerald-700; }
    .badge-red    { @apply badge bg-red-100 text-red-700; }
    .badge-yellow { @apply badge bg-amber-100 text-amber-700; }
    .badge-blue   { @apply badge bg-blue-100 text-blue-700; }
    .badge-gray   { @apply badge bg-slate-100 text-slate-500; }
    .badge-violet { @apply badge bg-violet-100 text-violet-700; }
    .nav-link     { @apply flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer; }
    .nav-active   { @apply flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm bg-indigo-600 text-white; }
    .nav-disabled { @apply flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-600 cursor-not-allowed; }
    .card         { @apply bg-white rounded-xl border border-slate-200 shadow-sm; }
    .th           { @apply text-left text-xs font-semibold text-slate-400 uppercase tracking-wider px-4 py-3; }
    .td           { @apply px-4 py-3 text-sm text-slate-700; }
    .btn-primary  { @apply px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors; }
    .btn-danger   { @apply px-3 py-1.5 bg-red-50 text-red-600 text-xs font-medium rounded-lg hover:bg-red-100 transition-colors border border-red-200; }
    .btn-ghost    { @apply px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-medium rounded-lg hover:bg-slate-200 transition-colors; }
    .input        { @apply w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent; }
  </style>
</head>
<body class="h-full bg-slate-50 flex">

  <!-- Sidebar -->
  <aside class="fixed inset-y-0 left-0 w-56 bg-slate-900 flex flex-col z-20">
    <div class="px-5 py-5 border-b border-slate-800">
      <div class="text-white font-bold text-sm tracking-wide">🛡 AI Guardian</div>
      <div class="text-slate-500 text-xs mt-0.5">Control Panel</div>
    </div>

    <!-- Service status pill -->
    <div class="px-5 py-3 border-b border-slate-800">
      <div class="flex items-center gap-2">
        <span class="relative flex h-2 w-2">
          <span id="pulse-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
          <span id="status-dot" class="relative inline-flex rounded-full h-2 w-2 bg-slate-400"></span>
        </span>
        <span class="text-xs text-slate-400" id="status-text">Checking…</span>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <a href="/overview" class="{{ 'nav-active' if active == 'overview' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
        </svg>
        Overview
      </a>

      <div class="pt-5 pb-1.5 px-3 text-xs font-semibold text-slate-500 uppercase tracking-widest">Disk</div>
      <a href="/events" class="{{ 'nav-active' if active == 'events' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Events
      </a>
      <a href="/permissions" class="{{ 'nav-active' if active == 'permissions' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        Permissions
      </a>
      <a href="/config" class="{{ 'nav-active' if active == 'config' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
        </svg>
        Config
      </a>

      <div class="pt-5 pb-1.5 px-3 text-xs font-semibold text-slate-500 uppercase tracking-widest">DB Guardian</div>
      <a href="/db" class="{{ 'nav-active' if active == 'db' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
        </svg>
        Events
      </a>

      <div class="pt-5 pb-1.5 px-3 text-xs font-semibold text-slate-500 uppercase tracking-widest">Email Guardian</div>
      <a href="/email" class="{{ 'nav-active' if active == 'email' else 'nav-link' }}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Events
      </a>
    </nav>

    <div class="px-5 py-3 border-t border-slate-800">
      <div class="text-slate-600 text-xs">v0.1 · eBPF mode</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="ml-56 flex-1 flex flex-col min-h-full">
    {% block content %}{% endblock %}
  </div>

  <script>
    async function refreshStatus() {
      try {
        const d = await fetch('/api/status').then(r => r.json());
        const dot  = document.getElementById('status-dot');
        const ring = document.getElementById('pulse-ring');
        const txt  = document.getElementById('status-text');
        if (d.status === 'active') {
          dot.className  = 'relative inline-flex rounded-full h-2 w-2 bg-emerald-400';
          ring.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75';
          txt.textContent = 'Guardian active';
          txt.className = 'text-xs text-emerald-400';
        } else {
          dot.className  = 'relative inline-flex rounded-full h-2 w-2 bg-red-400';
          ring.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75';
          txt.textContent = 'Guardian ' + d.status;
          txt.className = 'text-xs text-red-400';
        }
      } catch(e) {}
    }
    refreshStatus();
    setInterval(refreshStatus, 15000);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
